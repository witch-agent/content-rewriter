<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Rewriter Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #050505;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #111111;
            --text: #f5f5f5;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent: #00ffa3;
            --accent-glow: rgba(0, 255, 163, 0.15);
            --accent-secondary: #00d4ff;
            --border: #1a1a1a;
            --border-hover: #333333;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 2rem 0;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        h1 span {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Editor Grid */
        .editor-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .editor-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .editor-panel:focus-within {
            border-color: var(--border-hover);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-tertiary);
        }

        .panel-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .word-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        textarea {
            width: 100%;
            min-height: 320px;
            padding: 1rem;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            line-height: 1.7;
            resize: none;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        textarea:focus {
            outline: none;
        }

        /* Style Selector */
        .controls-section {
            margin-bottom: 1.5rem;
        }

        .control-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
            display: block;
        }

        .style-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .style-btn {
            padding: 0.6rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .style-btn:hover {
            border-color: var(--border-hover);
            color: var(--text);
        }

        .style-btn.active {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Action Button */
        .action-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .generate-btn {
            flex: 1;
            padding: 1rem 2rem;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading State */
        .loading-overlay {
            display: none;
            text-align: center;
            padding: 2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .loading-overlay.show {
            display: block;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Output Panel */
        .output-panel {
            display: none;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .output-panel.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        .output-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .copy-btn {
            padding: 0.4rem 0.75rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .output-content {
            padding: 1rem;
            font-size: 0.95rem;
            line-height: 1.8;
            white-space: pre-wrap;
            color: var(--text-secondary);
        }

        /* API Status */
        .api-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-dot.connected {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        footer p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .editor-section {
                grid-template-columns: 1fr;
            }
            
            textarea {
                min-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">&lt;/&gt; witch-agent</div>
            <h1>Content <span>Rewriter</span></h1>
            <p class="subtitle">Transform your content into any style with AI power</p>
        </header>

        <div class="api-status">
            <div class="status-dot" id="apiStatus"></div>
            <span class="status-text" id="apiStatusText">Template Mode - API Ready</span>
        </div>

        <div class="editor-section">
            <div class="editor-panel">
                <div class="panel-header">
                    <span class="panel-title">Input</span>
                    <span class="word-count" id="inputCount">0 words</span>
                </div>
                <textarea id="inputText" placeholder="Paste your content here...&#10;&#10;Whether it's a rough draft, an old article, or notes - transform it into polished, professional content."></textarea>
            </div>

            <div class="editor-panel">
                <div class="panel-header">
                    <span class="panel-title">Output</span>
                    <span class="word-count" id="outputCount">0 words</span>
                </div>
                <textarea id="outputText" placeholder="Your rewritten content will appear here..." readonly></textarea>
            </div>
        </div>

        <div class="controls-section">
            <label class="control-label">Rewrite Style</label>
            <div class="style-grid">
                <button class="style-btn active" data-style="professional">Professional</button>
                <button class="style-btn" data-style="casual">Casual</button>
                <button class="style-btn" data-style="academic">Academic</button>
                <button class="style-btn" data-style="technical">Technical</button>
                <button class="style-btn" data-style="creative">Creative</button>
                <button class="style-btn" data-style="persuasive">Persuasive</button>
                <button class="style-btn" data-style="storytelling">Storytelling</button>
                <button class="style-btn" data-style="concise">Concise</button>
            </div>
        </div>

        <div class="action-section">
            <button class="generate-btn" onclick="rewriteContent()">
                Rewrite Content
            </button>
        </div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <p class="loading-text">Transforming your content...</p>
        </div>

        <div class="output-panel" id="outputPanel">
            <div class="output-header">
                <span class="output-label">Rewritten Content</span>
                <button class="copy-btn" onclick="copyOutput()">Copy</button>
            </div>
            <div class="output-content" id="outputContent"></div>
        </div>

        <footer>
            <p>Built by witch-agent | Transform with style</p>
        </footer>
    </div>

    <script>
        // Configuration
        // Configuration - Set your Vercel/API endpoint here
const API_ENDPOINT = 'https://content-rewriter-gamma.vercel.app/api/rewrite';
        
        let selectedStyle = 'professional';

        // Check API health on load
        async function checkApiHealth() {
            try {
                const response = await fetch('http://localhost:3000/api/health');
                const data = await response.json();
                const statusDot = document.getElementById('apiStatus');
                const statusText = document.getElementById('apiStatusText');
                
                if (data.apiConfigured) {
                    statusDot.classList.add('connected');
                    statusText.textContent = 'API Connected - Ready';
                } else {
                    statusText.textContent = 'API Not Configured - Add API Key in server.js';
                }
            } catch (error) {
                document.getElementById('apiStatusText').textContent = 'Server Not Running - Start server.js';
            }
        }
        
        checkApiHealth();

        // Style selection
        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedStyle = btn.dataset.style;
            });
        });

        // Word count
        document.getElementById('inputText').addEventListener('input', function() {
            const text = this.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            document.getElementById('inputCount').textContent = words + ' words';
        });

        document.getElementById('outputText').addEventListener('input', function() {
            const text = this.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            document.getElementById('outputCount').textContent = words + ' words';
        });

        // Rewrite function
        async function rewriteContent() {
            const input = document.getElementById('inputText').value.trim();
            
            if (!input) {
                alert('Please enter some content to rewrite!');
                return;
            }

            // Show loading
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('outputPanel').classList.remove('show');

            try {
                // Try API first if configured
                if (API_ENDPOINT) {
                    const response = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            text: input, 
                            style: selectedStyle 
                        })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        const result = data.result || data.content || data.text || data.error || 'No result returned';
                        displayOutput(result);
                        return;
                    } else {
                        const errorData = await response.json();
                        throw new Error(errorData.message || 'API request failed');
                    }
                }
                
                // Fallback to templates - removed since we want API only
                throw new Error('API request failed');
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingOverlay').classList.remove('show');
                alert('Error: ' + error.message + '\n\nPlease check if the API is properly configured in Vercel.');
            }
        }

        // Template-based generation
        function generateWithTemplate(text, style) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const templates = {
                        professional: `PROFESSIONAL REWRITE\n\n${text}\n\n---\n\n[AI-powered rewrite in professional style. Connect API for intelligent rewriting.]`,
                        casual: `CASUAL REWRITE\n\n${text}\n\n---\n\n[AI-powered rewrite in casual style. Connect API for intelligent rewriting.]`,
                        academic: `ACADEMIC REWRITE\n\n${text}\n\n---\n\n[AI-powered rewrite in academic style. Connect API for intelligent rewriting.]`,
                        technical: `TECHNICAL REWRITE\n\n${text}\n\n---\n\n[AI-powered rewrite in technical style. Connect API for intelligent rewriting.]`,
                        creative: `CREATIVE REWRITE\n\n${text}\n\n---\n\n[AI-powered rewrite in creative style. Connect API for intelligent rewriting.]`,
                        persuasive: `PERSUASIVE REWRITE\n\n${text}\n\n---\n\n[AI-powered rewrite in persuasive style. Connect API for intelligent rewriting.]`,
                        storytelling: `STORYTELLING REWRITE\n\n${text}\n\n---\n\n[AI-powered rewrite in storytelling style. Connect API for intelligent rewriting.]`,
                        concise: `CONCISE REWRITE\n\n${text}\n\n---\n\n[AI-powered rewrite in concise style. Connect API for intelligent rewriting.]`
                    };
                    resolve(templates[style] || templates.professional);
                }, 1500);
            });
        }

        function displayOutput(text) {
            document.getElementById('loadingOverlay').classList.remove('show');
            document.getElementById('outputText').value = text;
            document.getElementById('outputContent').textContent = text;
            document.getElementById('outputPanel').classList.add('show');
            
            // Update word count
            const words = text.trim().split(/\s+/).length;
            document.getElementById('outputCount').textContent = words + ' words';
        }

        function copyOutput() {
            const text = document.getElementById('outputText').value;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 2000);
            });
        }
    </script>
</body>
</html>
