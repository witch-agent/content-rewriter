<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Rewriter</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --bg-secondary: #111111;
            --text: #f0f0f0;
            --text-muted: #888888;
            --accent: #00ffa3;
            --accent-dim: rgba(0, 255, 163, 0.1);
            --border: #222222;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            color: var(--text-muted);
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .editor-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .editor-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            resize: vertical;
            line-height: 1.7;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .style-selector {
            margin-bottom: 2rem;
        }

        .style-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .styles {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .style-btn {
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .style-btn:hover {
            border-color: var(--text-muted);
        }

        .style-btn.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        .action-btn {
            width: 100%;
            padding: 1.25rem;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--bg);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 163, 0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 3rem;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .copy-btn {
            padding: 0.4rem 0.75rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        footer {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
        }

        @media (max-width: 768px) {
            .editor-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Content <span>Rewriter</span></h1>
            <p class="subtitle">Transform your content into different styles</p>
        </header>

        <div class="editor-grid">
            <div class="editor-box">
                <div class="editor-label">
                    <span>Original Text</span>
                </div>
                <textarea id="input" placeholder="Paste your content here..."></textarea>
            </div>
            <div class="editor-box">
                <div class="editor-label">
                    <span>Rewritten</span>
                    <button class="copy-btn" onclick="copyOutput()">Copy</button>
                </div>
                <textarea id="output" placeholder="Rewritten content will appear here..." readonly></textarea>
            </div>
        </div>

        <div class="style-selector">
            <div class="style-label">Choose Style</div>
            <div class="styles">
                <button class="style-btn active" data-style="professional">Professional</button>
                <button class="style-btn" data-style="casual">Casual</button>
                <button class="style-btn" data-style="academic">Academic</button>
                <button class="style-btn" data-style="creative">Creative</button>
                <button class="style-btn" data-style="social">Social Media</button>
                <button class="style-btn" data-style="email">Email</button>
            </div>
        </div>

        <button class="action-btn" onclick="rewrite()">Rewrite Content</button>

        <div class="loading" id="loading">
            <div class="spinner">⟳</div>
            <p>Rewriting your content...</p>
        </div>

        <footer>
            <p>Built by witch-agent</p>
        </footer>
    </div>

    <script>
        let selectedStyle = 'professional';

        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedStyle = btn.dataset.style;
            });
        });

        // Template-based rewriting (fallback)
        const templates = {
            professional: (text) => {
                return `PROFESSIONAL REWRITE:\n\n${text}\n\n---\n\n[This is a professional rewrite using template-based formatting. Connect an AI API for real intelligent rewriting.]`;
            },
            casual: (text) => {
                return `Hey! Here's a casual version:\n\n${text}\n\n---\n\n[This is a casual rewrite using template-based formatting.]`;
            },
            academic: (text) => {
                return `ACADEMIC REWRITE:\n\n${text}\n\n[Note: This is a template-based rewrite. Connect AI API for intelligent academic writing.]`;
            },
            creative: (text) => {
                return `✨ CREATIVE REWRITE ✨\n\n${text}\n\n---\n\n[Creative rewrite using templates. Connect AI for real creative content.]`;
            },
            social: (text) => {
                return `🗣️ SOCIAL MEDIA VERSION:\n\n${text}\n\n#Content #Writing\n\n[Template-based. Connect AI for real social content.]`;
            },
            email: (text) => {
                return `Subject: Quick Update\n\nDear [Recipient],\n\n${text}\n\nBest regards,\n[Your Name]\n\n[Template-based. Connect AI for real email writing.]`;
            }
        };

        function rewrite() {
            const input = document.getElementById('input').value.trim();
            
            if (!input) {
                alert('Please enter some content to rewrite!');
                return;
            }

            document.getElementById('loading').classList.add('show');
            document.getElementById('output').value = '';

            // Simulate processing
            setTimeout(() => {
                const result = templates[selectedStyle](input);
                document.getElementById('output').value = result;
                document.getElementById('loading').classList.remove('show');
            }, 1500);
        }

        function copyOutput() {
            const output = document.getElementById('output');
            navigator.clipboard.writeText(output.value).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = 'Copy';
                }, 2000);
            });
        }
    </script>
</body>
</html>
